<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Eric's Footy Site — Live football news from BBC Sport and Fotmob, updated every 24 hours." />
  <title>Eric's Footy Site</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════════════════
       SIDEBAR
  ═══════════════════════════════════════════════════════════════════════════ -->
  <aside class="sidebar" role="navigation" aria-label="Site navigation">

    <!-- Logo -->
    <div class="sidebar-logo">
      <img src="/assets/logo.jpg" alt="Eric's Footy Site Logo" class="logo-img" />
      <div class="logo-info">
        <span class="logo-name">Eric's Footy</span>
        <span class="logo-tagline">News Dashboard</span>
      </div>
    </div>

    <!-- Navigation / Filters -->
    <nav class="sidebar-nav" aria-label="Article filters">
      <p class="nav-label">Navigation</p>

      <button id="nav-all" class="nav-item active" data-filter="all" aria-pressed="true">
        <span class="nav-icon">📰</span>
        All Articles
        <span class="nav-badge" id="badge-all">—</span>
      </button>

      <button id="nav-bbc_sport" class="nav-item" data-filter="bbc_sport" aria-pressed="false">
        <span class="nav-icon">🔴</span>
        BBC Sport
        <span class="nav-badge" id="badge-bbc">—</span>
      </button>

      <button id="nav-fotmob" class="nav-item" data-filter="fotmob" aria-pressed="false">
        <span class="nav-icon">🔵</span>
        Fotmob
        <span class="nav-badge" id="badge-fotmob">—</span>
      </button>

      <button id="nav-saved" class="nav-item" data-filter="saved" aria-pressed="false">
        <span class="nav-icon">⭐</span>
        Saved
        <span class="nav-badge" id="badge-saved">—</span>
      </button>
    </nav>

    <!-- Saved Articles Quick List -->
    <div class="sidebar-saved" aria-label="Saved articles">
      <p class="saved-list-label">Recent Saves</p>
      <ul class="saved-list" id="saved-list" role="list">
        <li class="saved-empty">No saved articles yet</li>
      </ul>
    </div>

    <!-- Footer: last updated -->
    <div class="sidebar-footer">
      <div class="last-updated-sidebar">
        <div class="live-dot" aria-hidden="true"></div>
        <span id="last-updated-text">Loading…</span>
      </div>
    </div>

  </aside>

  <!-- ═══════════════════════════════════════════════════════════════════════
       MAIN CONTENT
  ═══════════════════════════════════════════════════════════════════════════ -->
  <div class="main">

    <!-- Top bar -->
    <header class="topbar" role="banner">
      <div class="breadcrumb">
        <span>Home</span>
        <span class="breadcrumb-sep">/</span>
        <span class="breadcrumb-current" id="breadcrumb-label">Latest Articles</span>
      </div>
      <div class="topbar-actions">
        <button
          id="btn-refresh"
          class="btn-refresh"
          aria-label="Refresh articles now"
        >
          <span class="refresh-icon" aria-hidden="true">↻</span>
          Refresh Feed
        </button>
      </div>
    </header>

    <!-- Scrollable content -->
    <main class="content-scroll" role="main">

      <!-- Stats Strip -->
      <section class="stats-strip" aria-label="Article statistics">
        <div class="stat-card accent">
          <p class="stat-label">Total Articles</p>
          <p class="stat-num" id="stat-total">—</p>
          <p class="stat-sub">Past 24 hours</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">BBC Sport</p>
          <p class="stat-num" id="stat-bbc">—</p>
          <p class="stat-sub">Articles</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">Fotmob</p>
          <p class="stat-num" id="stat-fotmob">—</p>
          <p class="stat-sub">Articles</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">Saved</p>
          <p class="stat-num" id="stat-saved">—</p>
          <p class="stat-sub">Bookmarked</p>
        </div>
      </section>

      <!-- Articles -->
      <section aria-label="News articles">
        <div class="section-header">
          <h1 class="section-title" id="section-title">Latest Football News</h1>
          <span class="section-count" id="article-count"></span>
        </div>
        <div
          class="articles-grid"
          id="articles-grid"
          aria-live="polite"
          aria-atomic="false"
        ></div>
      </section>

    </main>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container" role="status" aria-live="polite"></div>

  <script src="/js/app.js"></script>
</body>
</html>

[variables]
# Install Playwright browsers into /app/ so they survive into the runtime
# container. The default /root/.cache/ path is discarded between build & run.
PLAYWRIGHT_BROWSERS_PATH = "/app/.playwright-browsers"

[phases.setup]
nixPkgs = [
  "chromium",
  "nss",
  "nspr",
  "atk",
  "at-spi2-atk",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "libxkbcommon",
  "mesa",
  "expat",
  "libdrm",
  "xorg.libXtst",
  "xorg.libXi",
  "alsa-lib",
  "pango",
  "cairo",
  "cups",
  "dbus",
  "gdk-pixbuf",
  "gtk3",
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium",
]

# NOTE: No [start] block — Railway uses the Procfile.

[phases.setup]
nixPkgs = [
  "chromium",
  "nss",
  "nspr",
  "atk",
  "at-spi2-atk",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "libxkbcommon",
  "mesa",
  "expat",
  "libdrm",
  "xorg.libXtst",
  "xorg.libXi",
  "alsa-lib",
  "pango",
  "cairo",
  "cups",
  "dbus",
  "gdk-pixbuf",
  "gtk3",
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
]

[start]
# scraper.py uses shutil.which('chromium') to find the nixPkgs system
# Chromium at runtime — no 'playwright install' download needed.
cmd = "gunicorn --worker-class sync --workers 1 --bind 0.0.0.0:$PORT --timeout 30 --chdir tools server:app"

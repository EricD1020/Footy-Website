[variables]
# Browsers installed here at build time persist into the runtime container.
# The default /root/.cache/ path is NOT preserved across build→runtime.
PLAYWRIGHT_BROWSERS_PATH = "/app/.playwright-browsers"

[phases.setup]
nixPkgs = [
  "chromium",
  "nss",
  "nspr",
  "atk",
  "at-spi2-atk",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "libxkbcommon",
  "mesa",
  "expat",
  "libdrm",
  "xorg.libXtst",
  "xorg.libXi",
  "alsa-lib",
  "pango",
  "cairo",
  "cups",
  "dbus",
  "gdk-pixbuf",
  "gtk3",
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium",
]

[start]
# Railway uses this, NOT the Procfile, when nixpacks.toml is present.
# Run playwright install first — instant if build already installed it,
# downloads fresh (~60s) if the build artifact didn't persist.
cmd = "playwright install chromium && gunicorn --worker-class sync --workers 1 --bind 0.0.0.0:$PORT --timeout 30 --chdir tools server:app"
